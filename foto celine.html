<html>
<head>
<title>Foto celine</title>
<style>
  /* Background halaman gradasi pink pastel mewah */
  body {
    background: linear-gradient(135deg, #fff0f5 0%, #ffe4e1 50%, #ffb6c1 100%);
    background-attachment: fixed;
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
  }

  /* Bingkai Model Baru untuk Celine (Model Card Kaca Pink) */
  .card-celine {
    position: relative;
    width: 250px;
    padding: 20px;
    background: rgba(255, 255, 255, 0.6); /* Efek transparan putih susu */
    border: 6px double #ff69b4; /* Garis bingkai ganda warna pink cerah */
    border-radius: 25px;
    box-shadow: 0 10px 30px rgba(255, 105, 180, 0.4);
    backdrop-filter: blur(5px);
    text-align: center;
  }

  /* Foto Celine ditaruh di dalam card */
  .foto-celine {
    width: 210px;
    height: 230px;
    object-fit: cover;
    border-radius: 15px;
    border: 3px solid #ffffff;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
  }

  /* Ornamen Nama Celine */
  .nama-anggota {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
    color: #d11a5b;
    letter-spacing: 1px;
  }

  /* Ornamen Tulisan Pinkyy di bawahnya */
  .sub-tulisan {
    margin-top: 4px;
    font-size: 13px;
    font-style: italic;
    color: #ff69b4;
    font-weight: 600;
  }

  /* Hiasan hati gemas tambahan di atas bingkai */
  .card-celine::before {
    content: "💖 ✨";
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 20px;
    background: #fff0f5;
    padding: 0 10px;
  }
</style>
</head>
<body>
<br><br><br>

<div align="center">
  <div class="card-celine">
    <a href="data celine.html">
      <img src="celine.jpeg" class="foto-celine" border="0">
    </a>
    
    <div class="nama-anggota">🎀 CELINE 🎀</div>
    <div class="sub-tulisan">Pinkyy</div>
  </div>
</div>

</body>
</html>
