<html>
<head>
<title>BAGIAN ATAS</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&display=swap" rel="stylesheet">
<style>
  body {
    background-image: url("pink 1.webp");
    background-size: cover;
    background-position: center;
    margin: 0;
    padding: 0;
    overflow: hidden; /* Mencegah munculnya scrollbar di frame atas */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh; /* Memaksa konten selalu berada tepat di tengah frame */
  }

  /* Wadah teks berjalan biar punya bentuk frame stiker imut */
  .banner-container {
    width: 90%;
    max-width: 800px;
    background: rgba(255, 255, 255, 0.75); /* Efek transparan estetik */
    padding: 10px 20px;
    border-radius: 50px; /* Membuat sudut melengkung oval rapi */
    box-shadow: 0 6px 15px rgba(255, 182, 193, 0.4); /* Bayangan soft pink */
    border: 2px solid #ffffff;
    outline: 3px dashed #ffb6c1; /* Garis putus-putus khas tema kelompokmu */
    outline-offset: -1px;
  }

  /* Desain Teks Marquee */
  .text-kelompok {
    font-family: 'Fredoka', 'Lucida Calligraphy', sans-serif;
    color: #ff69b4; /* Warna pink cerah agar kontras dan terbaca jelas */
    font-size: 24px;
    font-weight: 600;
    text-shadow: 2px 2px 0px #ffffff, 4px 4px 10px rgba(255, 105, 180, 0.3); /* Efek bayangan teks 3D mami */
    margin: 0;
  }
</style>
</head>
<body>

<div class="banner-container">
  <marquee direction="left" scrollamount="5" behavior="alternate">
    <p class="text-kelompok">🌸 ꧁༺ Kelompok 4 Pinky Kelas 1EA23 ༻꧂ 🌸</p>
  </marquee>
</div>

</body>
</html>
