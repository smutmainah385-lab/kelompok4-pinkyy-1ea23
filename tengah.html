<html>
<head>
<title>Welcome Page Tengah</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&display=swap" rel="stylesheet">
<style>
  /* Background halaman serasi dengan warna dasar kelompokmu */
  body {
    background-image: url("p polos.jpg"); /* Tetap pakai gambar pink polosmu sebagai dasar */
    background-size: cover;
    background-position: center;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Fredoka', sans-serif;
    overflow: hidden;
  }

  /* Box container utama berbentuk stiker melengkung yang estetik */
  .welcome-box {
    background: rgba(255, 255, 255, 0.85); /* Efek transparan mami */
    padding: 25px;
    border-radius: 25px;
    text-align: center;
    max-width: 80%;
    box-shadow: 0 10px 25px rgba(255, 182, 193, 0.4);
    border: 3px solid #ffffff;
    outline: 3px dashed #ffb6c1; /* Garis putus-putus khas tema pinky */
    outline-offset: -1px;
    animation: apung 3s ease-in-out infinite; /* Efek animasi melayang lembut */
  }

  /* Desain Text Judul */
  .welcome-box h1 {
    color: #ff69b4;
    font-size: 22px;
    margin: 0 0 10px 0;
    letter-spacing: 0.5px;
  }

  /* Desain Teks Petunjuk */
  .welcome-box p {
    color: #666666;
    font-size: 13px;
    margin: 0;
    line-height: 1.5;
  }

  /* Hiasan emoji melayang di dalam box */
  .emoji-hiasan {
    font-size: 30px;
    margin-bottom: 5px;
    display: inline-block;
  }

  /* Animasi naik turun halus biar web terlihat hidup */
  @keyframes apung {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
  }
</style>
</head>
<body>

<div class="welcome-box">
  <div class="emoji-hiasan">✨🌸✨</div>
  <h1>Selamat Datang!</h1>
  <p>Silakan klik salah satu <b>Nama Anggota Kelompok</b> pada tabel di sebelah kiri untuk melihat detail foto profil mereka.</p>
</div>

</body>
</html>
