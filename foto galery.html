<html>
<head>
<title>Foto Galery</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/apple-color-emoji" rel="stylesheet">
<style>
  /* Background halaman galeri serasi dengan lagu dan gif */
  body {
    background-image: url("pink 5.gif");
    background-attachment: fixed;
    margin: 0;
    padding: 10px 0 0 0; /* Mengurangi padding atas agar elemen naik */
    font-family: 'Fredoka', sans-serif;
  }

  /* Memastikan posisi audio tidak terlalu turun */
  audio {
    display: block;
    margin: 5px auto; /* Memposisikan audio di tengah dengan margin tipis */
  }

  /* Wadah utama pembungkus setiap foto biar berbentuk frame lucu */
  .frame-galeri-mini {
    display: inline-block;
    position: relative;
    margin: 25px 20px; /* Mengurangi margin atas-bawah dari 35px ke 25px agar naik */
    padding: 12px;
    background: #ffffff;
    border: 4px solid #ffffff;
    /* Efek garis tepi putus-putus soft pink ala stiker imut */
    outline: 3px dashed #ffb6c1;
    outline-offset: -1px;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(255, 182, 193, 0.4);
    vertical-align: middle;
    text-align: center;
  }

  /* Pengaturan semua foto di dalam galeri secara umum */
  .frame-galeri-mini img {
    border-radius: 12px;
    object-fit: cover;
    object-position: center center; /* Default tengah */
    display: block;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
  }

  /* Khusus foto Killa dan Selviana agar posisi muka pas */
  .fokus-atas {
    object-position: center 75% !important;
  }

  /* KHUSUS FOTO ZHAFIRAH: Menarik foto naik ke atas agar wajahnya pas & tidak terpotong */
  .fokus-zhafirah {
    object-position: center 15% !important;
  }

  /* Label Nama Kecil di bawah setiap foto */
  .label-nama {
    margin-top: 8px;
    font-size: 14px;
    color: #ff69b4;
    letter-spacing: 1px;
  }

  /* Dekorasi Emoji iPhone di atas tengah setiap bingkai foto */
  .frame-galeri-mini::before {
    content: "🎀";
    font-family: 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif;
    position: absolute;
    top: -16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 20px;
    background: #fff0f5;
    padding: 0 6px;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  }
</style>
</head>
<body>

<audio src="sun and moon.mpeg" autoplay loop controls></audio>

<marquee scrollamount="6" onmouseover="this.stop();" onmouseout="this.start();">
  
  <div class="frame-galeri-mini">
    <img src="bunga.webp" width="250" height="250">
    <div class="label-nama">Welcome 🌸</div>
  </div>

  <div class="frame-galeri-mini">
    <img src="tania.jpeg" width="250" height="250">
    <div class="label-nama">Tania ✨</div>
  </div>

  <div class="frame-galeri-mini">
    <img class="fokus-atas" src="killa.jpeg" width="250" height="250">
    <div class="label-nama">Killa 💖</div>
  </div>

  <div class="frame-galeri-mini">
    <img src="celine.jpeg" width="250" height="250">
    <div class="label-nama">Celine 🍒</div>
  </div>

  <div class="frame-galeri-mini">
    <img class="fokus-atas" src="selviana.jpeg" width="250" height="250">
    <div class="label-nama">Selviana 🐰</div>
  </div>

  <div class="frame-galeri-mini">
    <img src="kyan.jpeg" width="250" height="250">
    <div class="label-nama">Kyanda 🫧</div>
  </div>

  <div class="frame-galeri-mini">
    <img src="muty.jpeg" width="250" height="250">
    <div class="label-nama">Siti 👑</div>
  </div>

  <div class="frame-galeri-mini">
    <img class="fokus-zhafirah" src="fira.jpeg" width="250" height="250">
    <div class="label-nama">Zhafirah 🍓</div>
  </div>

  <div class="frame-galeri-mini">
    <img src="love.gif" width="250" height="250">
    <div class="label-nama">Love Ya 💕</div>
  </div>

  <div class="frame-galeri-mini">
    <img src="cute.gif" width="250" height="250">
    <div class="label-nama">Cute 🍯</div>
  </div>

</marquee>

</body>
</html>
